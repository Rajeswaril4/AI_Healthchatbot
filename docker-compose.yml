version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: healthchatbot-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    restart: always

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: healthchatbot-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    restart: always